name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # Pre-existing Freezed/lint infos shouldn't block CI; errors still fail.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

  build:
    name: Build & Release APK
    needs: quality
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Flutter clean
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare version info
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo $VERSION_LINE | cut -d'+' -f1)
          VERSION_CODE=${{ github.run_number }}
          DATE=$(date +'%Y%m%d_%H%M%S')
          TAG_NAME="v${VERSION_NAME}+${VERSION_CODE}"
          RELEASE_NAME="Build ${VERSION_NAME}+${VERSION_CODE}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Build release APK (prod flavor)
        run: |
          flutter build apk --release \
            --flavor prod \
            --dart-define=FLAVOR=prod \
            --no-tree-shake-icons \
            --no-shrink \
            --build-name $VERSION_NAME \
            --build-number $VERSION_CODE

      - name: Rename APK
        run: |
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-prod-release.apk \
            build/artifacts/app-prod-release-${VERSION_NAME}+${VERSION_CODE}-${DATE}.apk
          echo "APK_PATH=build/artifacts/app-prod-release-${VERSION_NAME}+${VERSION_CODE}-${DATE}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-release-${{ env.VERSION_NAME }}+${{ env.VERSION_CODE }}
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            **Automated Build from CI**
            - Version: `${{ env.VERSION_NAME }}+${{ env.VERSION_CODE }}`
            - Flavor: `prod`
            - Date: `${{ env.DATE }}`
            - Triggered by: `${{ github.actor }}`

            **Notes**
            - Uninstall the old version before installing this APK.
            - Built with `--flavor prod --dart-define=FLAVOR=prod`.
            - Built with `--no-shrink` and `--no-tree-shake-icons`.
          files: ${{ env.APK_PATH }}
