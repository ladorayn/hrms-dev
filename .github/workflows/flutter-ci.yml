name: Flutter CI - Build & Firebase Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable

      # Step 3 (Cache) is removed to avoid hitting your 500MB quota

      - name: Flutter clean
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare version info
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo $VERSION_LINE | cut -d'+' -f1)
          VERSION_CODE=${{ github.run_number }}
          DATE=$(date +'%Y%m%d_%H%M%S')
          TAG_NAME="v${VERSION_NAME}+${VERSION_CODE}"
          RELEASE_NAME="Build ${VERSION_NAME}+${VERSION_CODE}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Build release APK
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --no-shrink \
            --build-name $VERSION_NAME \
            --build-number $VERSION_CODE

      - name: Rename APK
        run: |
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/artifacts/app-release.apk
          echo "APK_PATH=build/artifacts/app-release.apk" >> $GITHUB_ENV

      # Step 9 (Upload-Artifact) is removed to stop the storage quota error

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS }}
          groups: testers
          file: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            🚀 **New Build Successful!**
            
            🔔 **Hey @JuicyBurger** — Your new APK is ready!
            
            📦 **Download Links:**
            * **Direct Download:** [Click here to download the APK](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/app-release.apk)
            * **Firebase:** Also available via your Firebase Tester email.
            
            🛠 **Version Info:**
            - Version: `${{ env.VERSION_NAME }}+${{ env.VERSION_CODE }}`
            - Date: `${{ env.DATE }}`
          files: ${{ env.APK_PATH }}
